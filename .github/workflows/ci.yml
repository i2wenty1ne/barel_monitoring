name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint if configured
        shell: pwsh
        run: |
          $scripts = (Get-Content package.json -Raw | ConvertFrom-Json).scripts
          if ($scripts.PSObject.Properties.Name -contains "lint") {
            npm run lint
          } else {
            "No lint script configured; skipping."
          }

      - name: Test if configured
        shell: pwsh
        run: |
          $scripts = (Get-Content package.json -Raw | ConvertFrom-Json).scripts
          if ($scripts.PSObject.Properties.Name -contains "test") {
            npm run test
          } else {
            "No test script configured; skipping."
          }

      - name: Build
        run: npm run build
