name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without v prefix. Leave empty to use package.json version.
        required: false
        type: string
      tag:
        description: Git tag. Leave empty to use v{version}.
        required: false
        type: string
      release_name:
        description: Release name. Leave empty to use Barrel Monitor v{version}.
        required: false
        type: string
      prerelease:
        description: Mark release as prerelease
        required: true
        type: boolean
        default: false
      draft:
        description: Create release as draft
        required: true
        type: boolean
        default: false
      overwrite_existing:
        description: Delete existing release/tag with the same name before publishing
        required: true
        type: boolean
        default: false
      run_tests:
        description: Run npm test if test script exists
        required: true
        type: boolean
        default: true
      release_notes:
        description: Optional release notes. Leave empty to auto-generate.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows-release:
    name: Build and publish Windows release
    runs-on: windows-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      INPUT_VERSION: ${{ inputs.version }}
      INPUT_TAG: ${{ inputs.tag }}
      INPUT_RELEASE_NAME: ${{ inputs.release_name }}
      INPUT_PRERELEASE: ${{ inputs.prerelease }}
      INPUT_DRAFT: ${{ inputs.draft }}
      INPUT_OVERWRITE_EXISTING: ${{ inputs.overwrite_existing }}
      INPUT_RUN_TESTS: ${{ inputs.run_tests }}
      INPUT_RELEASE_NOTES: ${{ inputs.release_notes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Test-Path package.json)) {
            throw "package.json not found"
          }

          $package = Get-Content package.json -Raw | ConvertFrom-Json

          $inputVersion = [string]$env:INPUT_VERSION
          $version = $inputVersion.Trim()

          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = [string]$package.version
          }

          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Release version is empty"
          }

          if (-not [string]::IsNullOrWhiteSpace($inputVersion)) {
            npm version $version --no-git-tag-version

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to update package.json version to $version"
            }
          }

          $inputTag = [string]$env:INPUT_TAG
          $tag = $inputTag.Trim()

          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "v$version"
          }

          $inputReleaseName = [string]$env:INPUT_RELEASE_NAME
          $releaseName = $inputReleaseName.Trim()

          if ([string]::IsNullOrWhiteSpace($releaseName)) {
            $releaseName = "Barrel Monitor v$version"
          }

          $safeTag = $tag -replace '[\\/:*?"<>|]', '-'

          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_TAG=$tag" >> $env:GITHUB_ENV
          "SAFE_RELEASE_TAG=$safeTag" >> $env:GITHUB_ENV
          "RELEASE_NAME=$releaseName" >> $env:GITHUB_ENV

          Write-Host "Resolved version: $version"
          Write-Host "Resolved tag: $tag"
          Write-Host "Resolved release name: $releaseName"

      - name: Check existing release and tag
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Checking release/tag: $env:RELEASE_TAG"

          $releaseExists = $false
          $releasesJson = gh release list --limit 1000 --json tagName

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to list GitHub releases."
          }

          $releases = $releasesJson | ConvertFrom-Json
          $matchedRelease = @($releases | Where-Object { $_.tagName -eq $env:RELEASE_TAG })

          if ($matchedRelease.Count -gt 0) {
            $releaseExists = $true
          }

          $tagOutput = git ls-remote --tags origin "refs/tags/$env:RELEASE_TAG"

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to check remote git tags."
          }

          $tagExists = -not [string]::IsNullOrWhiteSpace(($tagOutput | Out-String).Trim())

          Write-Host "Release exists: $releaseExists"
          Write-Host "Tag exists: $tagExists"

          if (($releaseExists -or $tagExists) -and $env:INPUT_OVERWRITE_EXISTING -ne "true") {
            throw "Release or tag '$env:RELEASE_TAG' already exists. Re-run with overwrite_existing=true to replace it."
          }

          if ($env:INPUT_OVERWRITE_EXISTING -eq "true") {
            if ($releaseExists) {
              Write-Host "Deleting existing GitHub release: $env:RELEASE_TAG"
              gh release delete $env:RELEASE_TAG --yes --cleanup-tag

              if ($LASTEXITCODE -ne 0) {
                throw "Failed to delete existing GitHub release '$env:RELEASE_TAG'."
              }
            }

            $tagOutputAfterReleaseDelete = git ls-remote --tags origin "refs/tags/$env:RELEASE_TAG"

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to re-check remote git tag after release delete."
            }

            $tagStillExists = -not [string]::IsNullOrWhiteSpace(($tagOutputAfterReleaseDelete | Out-String).Trim())

            if ($tagStillExists) {
              Write-Host "Deleting existing remote tag: $env:RELEASE_TAG"
              git push origin ":refs/tags/$env:RELEASE_TAG"

              if ($LASTEXITCODE -ne 0) {
                throw "Failed to delete existing remote tag '$env:RELEASE_TAG'."
              }
            }
          }

          Write-Host "Release/tag check completed successfully."

      - name: Typecheck
        run: npm run typecheck

      - name: Lint if configured
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $scripts = (Get-Content package.json -Raw | ConvertFrom-Json).scripts

          if ($scripts.PSObject.Properties.Name -contains "lint") {
            npm run lint

            if ($LASTEXITCODE -ne 0) {
              throw "Lint failed."
            }
          } else {
            Write-Host "No lint script configured; skipping."
          }

      - name: Test if configured
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $scripts = (Get-Content package.json -Raw | ConvertFrom-Json).scripts

          if ($env:INPUT_RUN_TESTS -eq "true" -and $scripts.PSObject.Properties.Name -contains "test") {
            npm run test

            if ($LASTEXITCODE -ne 0) {
              throw "Tests failed."
            }
          } else {
            Write-Host "No test script configured or run_tests=false; skipping."
          }

      - name: Build
        run: npm run build

      - name: Build Windows package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $scripts = (Get-Content package.json -Raw | ConvertFrom-Json).scripts
          $scriptNames = $scripts.PSObject.Properties.Name

          if ($scriptNames -contains "dist:win") {
            $distScript = "dist:win"
          } elseif ($scriptNames -contains "build:win") {
            $distScript = "build:win"
          } elseif ($scriptNames -contains "dist") {
            $distScript = "dist"
          } else {
            throw "No Windows packaging script found. Expected one of: dist:win, build:win, dist."
          }

          Write-Host "Running npm script: $distScript"
          npm run $distScript

          if ($LASTEXITCODE -ne 0) {
            throw "Windows packaging failed."
          }

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $artifactDir = "ci-artifacts"

          if (Test-Path $artifactDir) {
            Remove-Item $artifactDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $artifactDir | Out-Null

          $roots = @("release", "dist", "out")
          $allowedExtensions = @(".exe", ".msi", ".zip", ".7z", ".blockmap", ".yml", ".yaml")

          $files = @()

          foreach ($root in $roots) {
            if (Test-Path $root) {
              $files += Get-ChildItem -Path $root -Recurse -File |
                Where-Object {
                  $allowedExtensions -contains $_.Extension.ToLowerInvariant()
                }
            }
          }

          $files = $files | Sort-Object FullName -Unique

          if ($files.Count -eq 0) {
            throw "No Windows release artifacts found in release/, dist/, or out/."
          }

          $copiedFiles = @()

          foreach ($file in $files) {
            $targetName = $file.Name
            $targetPath = Join-Path $artifactDir $targetName
            $index = 2

            while (Test-Path $targetPath) {
              $baseName = [System.IO.Path]::GetFileNameWithoutExtension($file.Name)
              $extension = [System.IO.Path]::GetExtension($file.Name)
              $targetName = "$baseName-$index$extension"
              $targetPath = Join-Path $artifactDir $targetName
              $index++
            }

            Copy-Item $file.FullName $targetPath
            $copiedFiles += Get-Item $targetPath
          }

          $copiedFiles.FullName | Set-Content -Path artifacts.txt
          $copiedFiles.Name | Set-Content -Path artifact-names.txt

          "ARTIFACT_COUNT=$($copiedFiles.Count)" >> $env:GITHUB_ENV

          Write-Host "Artifacts:"
          $copiedFiles | ForEach-Object { Write-Host " - $($_.FullName)" }

      - name: Create release notes
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $inputNotes = [string]$env:INPUT_RELEASE_NOTES
          $notes = $inputNotes.Trim()

          $artifactList = (Get-Content artifact-names.txt) | ForEach-Object { "- $_" }
          $commitList = git log -20 --pretty=format:"- %h %s"
          $buildDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss 'UTC'")

          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = @"
          # Barrel Monitor $env:RELEASE_TAG

          Manual Windows release build.

          ## Build info

          - Version: $env:RELEASE_VERSION
          - Tag: $env:RELEASE_TAG
          - Commit: $env:GITHUB_SHA
          - Branch: $env:GITHUB_REF_NAME
          - Build date: $buildDate

          ## Artifacts

          $($artifactList -join "`n")

          ## Recent commits

          $commitList
          "@
          }

          $notes | Set-Content -Path release-notes.md -Encoding UTF8

      - name: Upload Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: barrel-monitor-windows-${{ env.SAFE_RELEASE_TAG }}
          path: ci-artifacts/*
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $args = @(
            "release",
            "create",
            $env:RELEASE_TAG,
            "--target",
            $env:GITHUB_SHA,
            "--title",
            $env:RELEASE_NAME,
            "--notes-file",
            "release-notes.md"
          )

          if ($env:INPUT_DRAFT -eq "true") {
            $args += "--draft"
          }

          if ($env:INPUT_PRERELEASE -eq "true") {
            $args += "--prerelease"
          }

          $args += Get-Content artifacts.txt

          gh @args

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to create GitHub Release."
          }

          $releaseUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/tag/$env:RELEASE_TAG"
          "RELEASE_URL=$releaseUrl" >> $env:GITHUB_ENV

      - name: Write workflow summary
        if: always()
        shell: pwsh
        run: |
          $releaseUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/tag/$env:RELEASE_TAG"

          $artifactNames = if (Test-Path artifact-names.txt) {
            (Get-Content artifact-names.txt) | ForEach-Object { "- $_" }
          } else {
            @("- No artifacts collected")
          }

          @"
          # Barrel Monitor Windows Release

          - App: Barrel Monitor
          - Version: $env:RELEASE_VERSION
          - Tag: $env:RELEASE_TAG
          - Release name: $env:RELEASE_NAME
          - Draft: $env:INPUT_DRAFT
          - Prerelease: $env:INPUT_PRERELEASE
          - Commit: $env:GITHUB_SHA
          - Branch: $env:GITHUB_REF_NAME
          - Release: $releaseUrl

          ## Uploaded files

          $($artifactNames -join "`n")
          "@ >> $env:GITHUB_STEP_SUMMARY
